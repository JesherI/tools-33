<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tools-33</title>
    <script>
      // Inicializar tema antes del primer render para evitar flash de color
      (function () {
        var theme = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
    <style>
      :root, [data-theme="light"] { --theme-bg: #ffffff; }
      [data-theme="dark"] { --theme-bg: #000000; }
      [data-theme="industrial"] { --theme-bg: #6d6e71; --theme-muted: #000000; }
      body { margin: 0; background-color: var(--theme-bg); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
